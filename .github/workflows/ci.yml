name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry==2.2.1

      - name: Install dependencies
        run: poetry install --no-root

      - name: Ruff
        run: poetry run ruff check .

      - name: Pytest with coverage
        run: poetry run pytest --cov=app --cov-report=term-missing --cov-report=xml
